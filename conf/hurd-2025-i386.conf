

# Debian GNU/Hurd 2025, hurd-i386, from the official pre-installed QEMU disk
# image. Pin the DATED snapshot (the 2025 release build), never the rolling
# debian-hurd.img.tar.gz "latest" symlink, so rebuilds are reproducible.
VM_VHD_LINK="https://cdimage.debian.org/cdimage/ports/latest/hurd-i386/debian-hurd-i386-20250807.img.tar.gz"
VM_OS_NAME="hurd"
VM_SSH_PORT=2222
VM_RELEASE=2025
VM_ARCH=i386

VM_ROOT_PASSWORD=anyvm.org

VM_LOGIN_TAG="login:"

# poweroff-hurd is the fallback when a daemon wedges the normal poweroff;
# the normal path is fine on an idle build VM.
VM_SHUTDOWN_CMD="poweroff"

VM_INSTALL_CMD="DEBIAN_FRONTEND=noninteractive apt-get install -y "

VM_RSYNC_PKG="rsync"

# No sshfs: the Hurd has no FUSE; sshfs/libfuse2/fuse3 have no hurd
# packages at all (probed 2026-07-20 on the amd64 image). No nfs either:
# the /hurd/nfs client translator is UDP-only (verified by catching its
# MOUNT-over-UDP datagram on the host), while anyvm's user-space nfsd
# speaks TCP only -- nfs sync becomes possible only if anyvm-org/nfsd
# grows a UDP transport.
VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG"

# The image's apt lists are stale (debian-ports archive moves fast), so the
# install step must apt-get update first.
VM_INSTALL_SCRIPT="hooks/vm_installpkgs.sh"

# The Hurd has no virtio drivers at all: disk must be IDE (the in-kernel
# gnumach IDE driver on i386), NIC must be e1000 (netdde), VGA plain std.
VM_DISK=ide
VM_NIC=e1000
VM_VGA=std

# The 32-bit gnumach cannot use big memory; 2G is the upstream-recommended
# sweet spot. Keep 1 vCPU: stock gnumach is uniprocessor (SMP experimental).
VM_MEMORY=2048
VM_CPU=1

# The image has root ssh access baked in by hooks/host_prepareImage.sh before
# the first boot; hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh
# then drive the rest over SSH, so we stay off the fragile console entirely.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

VM_SYNC_METHODS="rsync,scp"
