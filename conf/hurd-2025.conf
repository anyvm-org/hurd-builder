

# Debian GNU/Hurd 2025, hurd-amd64 (x86_64), from the official pre-installed
# QEMU disk image. Pin the DATED snapshot (the 2025 release build), never the
# rolling debian-hurd.img.tar.gz "latest" symlink, so rebuilds are reproducible.
VM_VHD_LINK="https://cdimage.debian.org/cdimage/ports/latest/hurd-amd64/debian-hurd-amd64-20250807.img.tar.gz"
VM_OS_NAME="hurd"
VM_SSH_PORT=2222
VM_RELEASE=2025
# VM_ARCH deliberately unset: x86_64 is the default everywhere in build.py,
# and an explicit value would add an arch suffix to the artifact name
# (hurd-2025-x86_64 instead of hurd-2025).

VM_ROOT_PASSWORD=anyvm.org

VM_LOGIN_TAG="login:"

# poweroff-hurd is the fallback when a daemon wedges the normal poweroff;
# the normal path is fine on an idle build VM.
VM_SHUTDOWN_CMD="poweroff"

VM_INSTALL_CMD="DEBIAN_FRONTEND=noninteractive apt-get install -y "

VM_RSYNC_PKG="rsync"

# No sshfs: the Hurd has no FUSE; sshfs/libfuse2/fuse3 have no hurd-amd64
# packages at all (probed 2026-07-20). No nfs either: the /hurd/nfs client
# translator is UDP-only (verified by catching its MOUNT-over-UDP datagram
# on the host), while anyvm's user-space nfsd speaks TCP only -- nfs sync
# becomes possible only if anyvm-org/nfsd grows a UDP transport.
VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG"

# The image's apt lists are stale (debian-ports archive moves fast), so the
# install step must apt-get update first.
VM_INSTALL_SCRIPT="hooks/vm_installpkgs.sh"

# The Hurd has no virtio drivers at all: NIC must be e1000 (netdde), VGA
# plain std. The disk is AHCI (rumpdisk/wd over ahcisata) on the q35 machine
# build.py selects for hurd amd64: on the i440fx pc machine, rumpdisk's piix
# IDE DMA cannot address 64-bit physical pages, so any VM with >= 3584 MB RAM
# fails root mounting with "ext2fs: part:1:device:wd0: Input/output error"
# (bug-hurd 2025-11 msg00017; -M q35 is the upstream-confirmed fix).
VM_DISK=sata
VM_NIC=e1000
VM_VGA=std

# Upstream recommends 2G for the amd64 image; 4G gives apt some headroom.
# Keep 1 vCPU: the stock gnumach is uniprocessor (SMP is experimental).
VM_MEMORY=4096
VM_CPU=1

# The image has root ssh access baked in by hooks/host_prepareImage.sh before
# the first boot; hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh
# then drive the rest over SSH, so we stay off the fragile console entirely.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

VM_SYNC_METHODS="rsync,scp"
